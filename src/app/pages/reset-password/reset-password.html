<app-header></app-header>

<div class="reset-page">
  <div class="reset-card">
    <div class="reset-form" *ngIf="!successMsg(); else successBlock">
      <h1 class="title">Create new password</h1>
      <p class="subtitle">Please enter and confirm your new password</p>

      <div class="field">
        <label>New Password</label>
        <div class="input-with-icon">
          <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" placeholder="Value" />
          <span class="eye-icon" (click)="showPassword = !showPassword">👁</span>
        </div>
      </div>

      <div class="field">
        <label>Confirm New Password</label>
        <div class="input-with-icon">
          <input [type]="showConfirmPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword" placeholder="Value" />
          <span class="eye-icon" (click)="showConfirmPassword = !showConfirmPassword">👁</span>
        </div>
      </div>

      <p class="error" *ngIf="errorMsg()">{{ errorMsg() }}</p>

      <button class="pill-btn" (click)="onSave()" [disabled]="loading() || !sessionReady()">
        Save new password
      </button>
    </div>

    <ng-template #successBlock>
      <div class="reset-form success">
        <h1 class="title">Password updated!</h1>
        <p class="subtitle">You can now sign in with your new password. Redirecting to login...</p>
      </div>
    </ng-template>
  </div>
</div>
