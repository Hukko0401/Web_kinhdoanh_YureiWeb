<div class="history">
  <div class="filters">
    <select class="filter-select" [ngModel]="typeFilter()" (ngModelChange)="setTypeFilter($event)">
      <option *ngFor="let opt of typeOptions" [value]="opt.value">{{ opt.label }}</option>
    </select>

    <div class="date-range">
      <input type="date" class="date-input" [ngModel]="dateFrom()" (ngModelChange)="dateFrom.set($event)" />
      <span class="date-sep">-</span>
      <input type="date" class="date-input" [ngModel]="dateTo()" (ngModelChange)="dateTo.set($event)" />
    </div>
  </div>

  <div class="table">
    <div class="table__header">
      <span>Type</span>
      <span>Change</span>
      <span>Balance</span>
      <span>Time</span>
      <span>Status</span>
    </div>

    <div class="table__body">
      <div class="table__row" *ngFor="let row of filteredRows()">
        <span>{{ typeLabel(row.type) }}</span>
        <span>{{ changeLabel(row) }}</span>
        <span>{{ row.displayBalance }}</span>
        <span class="table__time">{{ formatDate(row.time) }}</span>
        <span
          class="badge"
          [class.badge--success]="row.status === 'success'"
          [class.badge--failed]="row.status === 'failed'"
          [class.badge--pending]="row.status === 'pending'"
        >
          {{ row.status === 'success' ? 'Success' : row.status === 'failed' ? 'Failed' : 'Pending' }}
        </span>
      </div>

      <div class="table__empty" *ngIf="filteredRows().length === 0 && !loading()">
        Không có giao dịch nào.
      </div>
    </div>
  </div>
</div>
