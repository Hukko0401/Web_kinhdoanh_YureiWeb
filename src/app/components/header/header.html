<header class="app-header-wrapper" [class.header--transparent]="variant === 'transparent'">
  <div class="app-header">

    <!-- Logo -->
    <a routerLink="/" class="logo" (click)="closeMobileMenu()">
      <img src="/Icons/logo.png" alt="Yurei" />
    </a>

    <!-- Mobile Toggle -->
    <button
      class="menu-toggle"
      (click)="toggleMobileMenu()"
      [class.is-open]="isMobileMenuOpen"
      aria-label="Toggle menu">

      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Right -->
    <div class="right-group" [class.is-open]="isMobileMenuOpen">

      <!-- Navigation -->
      <nav class="main-nav">

        <a
          routerLink="/"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMobileMenu()">
          Home
        </a>

        <!-- Collections -->
        <div
          class="nav-dropdown"
          (mouseenter)="toggleCollections(true)"
          (mouseleave)="toggleCollections(false)">

          <span>Collections</span>

          <div class="dropdown-menu" *ngIf="isCollectionsOpen">

            <a
              *ngFor="let c of activeCollections"
              [routerLink]="c.id ? ['/collections', c.id] : null"
              [class.disabled]="!c.id"
              (click)="closeMobileMenu()">

              {{ c.name }}

            </a>

          </div>
        </div>

        <a
          *ngFor="let link of navLinks"
          [routerLink]="link.path"
          routerLinkActive="active"
          (click)="closeMobileMenu()">

          {{ link.label }}

        </a>

      </nav>

      <!-- Guest -->
      <div class="action-group guest" *ngIf="!isLoggedIn">

        <a
          routerLink="/login"
          class="btn"
          (click)="closeMobileMenu()">
          Log In
        </a>

        <a
          routerLink="/register"
          class="btn"
          (click)="closeMobileMenu()">
          Sign Up
        </a>

      </div>

      <!-- Logged In -->
      <div class="action-group user" *ngIf="isLoggedIn">

        <!-- Wallet -->
        <a
          routerLink="/wallet"
          class="icon-item coin-item"
          (click)="closeMobileMenu()">

          <img src="/Icons/coins.png" alt="Coins" />
          <span class="coin-balance">
            {{ coinBalance() }}
          </span>

        </a>

        <!-- Inventory -->
        <a
          routerLink="/inventory"
          class="icon-item"
          (click)="closeMobileMenu()">

          <img src="/Icons/inventory.png" alt="Inventory" />

        </a>

        <!-- Order History -->
        <a
          routerLink="/order-history"
          class="icon-item"
          (click)="closeMobileMenu()">

          <img src="/Icons/order_history.png" alt="Order History" />

        </a>

        <!-- Notifications -->
        <div class="icon-item notification-wrap">
          <button type="button" class="icon-btn" (click)="toggleNotifications()">
            <img src="/Icons/notification.png" alt="Notifications" />
          </button>

          <div class="notification-dropdown" *ngIf="isNotificationsOpen()">
            <div class="noti-header">
              <span class="noti-title">Notifications</span>
              <button type="button" class="noti-close" (click)="closeNotifications()">✕</button>
            </div>

            <div class="noti-divider"></div>

            <ng-container *ngIf="notifications().length > 0; else emptyNoti">
              <div class="noti-list" [class.scrollable]="showAllNotifications()">
                <div class="noti-item" *ngFor="let n of visibleNotifications">
                  <div class="noti-content">{{ n.content }}</div>
                  <div class="noti-time">{{ formatNotificationTime(n.time) }}</div>
                </div>
              </div>

              <ng-container *ngIf="!showAllNotifications()">
                <div class="noti-divider"></div>
                <a class="noti-view-all" (click)="onViewAllNotifications()">View all</a>
              </ng-container>
            </ng-container>

            <ng-template #emptyNoti>
              <div class="noti-empty">You don't have any notifications yet.</div>
            </ng-template>
          </div>
        </div>

        <!-- Profile -->
        <a
          routerLink="/profile"
          class="icon-item avatar-link"
          (click)="closeMobileMenu()">

          <img
            src="/Icons/profile.png"
            alt="Profile"
            class="avatar" />
        </a>
      </div>
    </div>
  </div>
  <div class="dropdown-backdrop" *ngIf="isNotificationsOpen()" (click)="closeNotifications()"></div>
</header>
