<div class="history-dim">
  <div class="history-frame">
    <button class="close-btn" (click)="close.emit()">X</button>

    <div class="history-content">
      <div class="history-header">
        <div class="history-title">ROLL HISTORY</div>

        <div class="banner-select">
          <select [value]="selectedBannerId() ?? ''" (change)="onBannerSelect($event)">
            @for (b of banners(); track b.collectionId) {
              <option [value]="b.collectionId">{{ b.name }}</option>
            }
          </select>
        </div>
      </div>

      <div class="history-table-wrap">
        <table class="history-table">
          <thead>
            <tr>
              <th>Banner</th>
              <th>Item Name</th>
              <th>Rarity</th>
              <th>Timestamp</th>
            </tr>
          </thead>
          <tbody>
            @for (row of rows(); track row.rollHistoryId) {
              <tr>
                <td>{{ row.banner }}</td>
                <td>{{ row.itemName }}</td>
                <td>{{ row.rarity }}</td>
                <td>{{ row.timestamp }}</td>
              </tr>
            }
            @for (_ of placeholderRows; track $index) {
              <tr class="history-table__empty-row">
                <td>&nbsp;</td>
                <td></td>
                <td></td>
                <td></td>
              </tr>
            }
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <button class="pagination__arrow" [disabled]="currentPage() === 1" (click)="goPrev()">‹</button>
        <span class="pagination__current">{{ currentPage() }}</span>
        <button class="pagination__arrow" [disabled]="currentPage() === totalPages()" (click)="goNext()">›</button>
      </div>
    </div>
  </div>
</div>
