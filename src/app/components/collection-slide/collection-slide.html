<div class="collection-slide">
  <img [src]="data.imageUrl" [alt]="data.title" class="collection-slide__image" />

  <div class="collection-slide__content">
    <h3 class="collection-slide__title">{{ data.title }}</h3>
    <p class="collection-slide__desc">{{ data.description }}</p>
    <a [routerLink]="['/collections', data.id]" class="collection-slide__btn">
      Learn more
      <span class="collection-slide__btn-icon">
        <svg viewBox="0 0 24 24" width="14" height="14">
          <path d="M9 18l6-6-6-6" stroke="#F5F5F5" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </a>
  </div>
</div>
