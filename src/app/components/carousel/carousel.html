<div class="carousel">
<button class="carousel__nav carousel__nav--prev" (click)="prev()" aria-label="Previous">
    <svg viewBox="0 0 24 24" width="24" height="24">
    <path d="M15 18l-6-6 6-6" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
</button>

<div class="carousel__viewport">
    <div class="carousel__track" [style.transform]="'translateX(-' + (currentIndex * 100) + '%)'">
    <ng-content></ng-content>
    </div>
</div>

<button class="carousel__nav carousel__nav--next" (click)="next()" aria-label="Next">
    <svg viewBox="0 0 24 24" width="24" height="24">
    <path d="M9 18l6-6-6-6" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
</button>
</div>
